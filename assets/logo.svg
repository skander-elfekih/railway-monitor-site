<svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00b8a8"/>
      <stop offset="0.5" stop-color="#12c494"/>
      <stop offset="1" stop-color="#55cc5a"/>
    </linearGradient>
  </defs>

  <!-- Gradient background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Main circle (light gray) -->
  <circle cx="256" cy="256" r="222" fill="#ececec"/>

  <!-- Train: 4 thick rounded strokes forming a bullet-train D-shape -->
  <g fill="none" stroke="#00c595" stroke-linecap="round" stroke-width="36">
    <!-- Rail 4 (bottom — flattest) -->
    <path d="M 72 302 L 326 302 C 362 302 376 284 368 260"/>
    <!-- Rail 3 -->
    <path d="M 72 250 L 340 250 C 382 250 398 272 392 306"/>
    <!-- Rail 2 -->
    <path d="M 72 198 L 336 198 C 390 198 416 234 410 278 C 406 304 393 322 380 332"/>
    <!-- Rail 1 (top — biggest curve, forms roof/nose) -->
    <path d="M 72 146 L 316 146 C 388 146 432 196 430 252 C 428 298 408 330 386 348 C 374 358 360 364 346 368"/>
  </g>

  <!-- Divider line -->
  <line x1="44" y1="336" x2="468" y2="336" stroke="#d2d2d2" stroke-width="3"/>

  <!-- Three signal dots -->
  <circle cx="172" cy="400" r="30" fill="#5aabf0"/>
  <circle cx="256" cy="400" r="30" fill="#5cc85c"/>
  <circle cx="340" cy="400" r="30" fill="#f05050"/>
</svg>
